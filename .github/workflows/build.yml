name: "Build kernels #134 - Native Fix"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 V60 Android 16 Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential curl git libpcre3-dev \
          libssl-dev lzop zlib1g-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          checkpolicy bison flex libncurses5-dev python3 libarchive-tools

      - name: "🌟 Clonando Fuente (Rama 23.2)"
        run: |
          git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_lge_sm8250 kernel_src --depth=1

      - name: "🛠️ Compilación con Clang Nativo"
        working-directory: ./kernel_src
        run: |
          # Usamos el Clang que ya trae el sistema (Ubuntu 22.04+)
          ARGS="ARCH=arm64 \
                CC=clang \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                LLVM=1 \
                LLVM_IAS=1"
          
          echo "📝 Configurando con defconfig..."
          make $ARGS defconfig
          
          echo "🚀 Iniciando build con parches de compatibilidad..."
          # Estos flags son CRUCIALES para que el Clang moderno acepte el código viejo del kernel
          # -Wno-error: Ignora errores leves
          # -fno-strict-aliasing: Evita errores de punteros
          # -Wno-visibility: Salta el error del enum mmu_notifier que vimos antes
          export KCFLAGS="-Wno-error -Wno-visibility -Wno-incompatible-function-pointer-types -Wno-implicit-function-declaration"
          
          make -j$(nproc --all) $ARGS KCFLAGS="$KCFLAGS"

      - name: "📦 Exportar"
        if: always()
        run: |
          mkdir -p dist
          if [ -d "kernel_src/arch/arm64/boot" ]; then
            find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
            find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          fi

      - name: "📤 Subiendo Artefactos"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-L23.2-Native"
          path: dist/
