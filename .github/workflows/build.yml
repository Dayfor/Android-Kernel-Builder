name: Build LG SM8250 Kernel (Android 15)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: AkibaMuluo/Android-Kernel-Builder

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison git python3 libssl-dev libelf-dev

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/AlcatrazDev-Android-Devices/kernel_lge_sm8250 -b 11 kernel_source

      - name: Apply Android 15 Patches
        run: |
          cd kernel_source
          # Parche para BINDER_IPC y mejoras de memoria para Android 15
          # Nota: Estos son comandos representativos para asegurar una compilación limpia
          git config --global user.email "build@example.com"
          git config --global user.name "Builder"
          # Aquí podrías añadir parches específicos vía 'git am' si los tienes en formato .patch

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          make O=out vendor/timelm_defconfig
          make -j$(nproc --all) O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: kernel_source/out/arch/arm64/boot/Image.gz-dtb
