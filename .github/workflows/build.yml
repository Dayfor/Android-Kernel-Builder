name: "Build kernels #134 - Kofir Edition"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🚀 V60 Kofir-Optimized Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Instalación de Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential curl git libpcre3-dev \
          libssl-dev lzop zlib1g-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          checkpolicy bison flex libncurses5-dev python3 libarchive-tools \
          clang lld llvm

      - name: "🌟 Clonando Fuente (Kofir)"
        run: |
          # Clonamos el repositorio de rofikkerneldev
          git clone --branch 4.19 https://github.com/rofikkerneldev/kernel_lgv600tm_4.19 kernel_src --depth=1

      - name: "🔧 Inyección de Compatibilidad (Hotfixes)"
        working-directory: ./kernel_src
        run: |
          # Corregir mmu_notifier.h para Clang moderno
          python3 -c "
          import sys
          path = 'include/linux/mmu_notifier.h'
          with open(path, 'r') as f: content = f.read()
          if 'enum mmu_notifier_event' not in content:
              insertion = '\nenum mmu_notifier_event { MMU_NOTIFIER_RELEASE, MMU_NOTIFIER_UNMAP };\n'
              content = content.replace('struct mmu_notifier_range {', insertion + 'struct mmu_notifier_range {')
              with open(path, 'w') as f: f.write(content)
          "
          
          # Desactivar Werror para evitar que la build se detenga por advertencias
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror/-Wno-error/g'

      - name: "🛠️ Configuración y Compilación"
        working-directory: ./kernel_src
        run: |
          LLD_PATH=$(which ld.lld)
          
          # Argumentos de compilación para SM8250 (V60)
          ARGS="ARCH=arm64 \
                LLVM=1 \
                LLVM_IAS=1 \
                CC=clang \
                LD=$LLD_PATH \
                AR=llvm-ar \
                NM=llvm-nm \
                OBJCOPY=llvm-objcopy \
                OBJDUMP=llvm-objdump \
                STRIP=llvm-strip \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi-"
          
          echo "📝 Configurando con timelm_defconfig..."
          # Este kernel suele usar timelm_defconfig o v60_defconfig
          make $ARGS timelm_defconfig || make $ARGS vendor/timelm_defconfig || make $ARGS defconfig
          
          echo "🚀 Iniciando build..."
          # Flags para silenciar advertencias de compatibilidad de Clang 14+
          KCF="-Wno-error -Wno-visibility -Wno-incompatible-function-pointer-types -Wno-implicit-function-declaration -Wno-return-type"
          
          make -j$(nproc --all) $ARGS KCFLAGS="$KCF"

      - name: "📦 Exportar Artefactos"
        if: always()
        run: |
          mkdir -p dist
          if [ -d "kernel_src/arch/arm64/boot" ]; then
            find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
            find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          fi

      - name: "📤 Subiendo Resultados"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-Kofir-Build"
          path: dist/
