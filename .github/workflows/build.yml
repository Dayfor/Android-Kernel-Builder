name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos: 
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      kernelDevice: "${{ matrix.repos.kernelSource.device }}"
      DEFCONFIG_NAME: "${{ matrix.repos.kernelSource.device }}_defconfig"
      withKernelSU: "${{ matrix.repos.withKernelSU }}"
      
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "${{ env.kernelDir }}"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch libarchive-tools
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz && cd Python-2.7.18
          ./configure --prefix=/usr/local --enable-shared LDFLAGS="-Wl,-rpath /usr/local/lib"
          make -j$(nproc) && sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          cd .. && rm -rf Python-2.7.18*

      - name: "🌟 Clone kernel source"
        working-directory: "./${{ env.kernelDir }}"
        run: git clone --recursive --branch "${{ env.kernelBranch }}" "${{ env.kernelRepo }}" "${{ env.kernelName }}" --depth=1

      - name: "💫 Get toolchains"
        working-directory: "./${{ env.kernelDir }}"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --recursive
