name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev zstd wget libfl-dev python3 libarchive-tools jq

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "💫 Get toolchains & Fix PATH"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --branch $branch $repo $name --depth=1
            BIN_PATH=$(find $(pwd)/$name -type d -name "bin" | head -n 1)
            if [ -n "$BIN_PATH" ]; then
              echo "$BIN_PATH" >> $GITHUB_PATH
            fi
          done

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          args="-j$(nproc --all) O=$(pwd)/${{ env.OUT_DIR }} ARCH=$ARCH LLVM=1 LLVM_IAS=1"
          args="$args CC=clang CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")"
          args="$args CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")"
          args="$args CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_COMPAT")"
          args="$args AR=$(echo $params | jq -r ".AR")"
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "🔧 Sync boot.img & Find Defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          # Buscar la ruta real del defconfig (priorizando vendor)
          SEARCH_CONF=$(find arch/arm64/configs -name "${{ env.DEFCONFIG_NAME }}" | head -n 1)
          if [ -z "$SEARCH_CONF" ]; then
            echo "❌ Error: No se encontró ${{ env.DEFCONFIG_NAME }}"
            exit 1
          fi
          FINAL_CONF=$(echo $SEARCH_CONF | sed 's|arch/arm64/configs/||')
          echo "FINAL_CONF=$FINAL_CONF" >> $GITHUB_ENV

          # Inyectar CMDLINE del boot.img proporcionado
          scripts/config --file $SEARCH_CONF --set-str CONFIG_CMDLINE "androidboot.memcg=1 video=vfb:640x400,bpp=32,memsize=3072000 lpm_levels.sleep_disabled=1 msm_rtb.filter=0x237 service_locator.enable=1 swiotlb=2048 loop.max_part=7 androidboot.usbcontroller=a600000.dwc3 kpti=off cgroup.memory=nokmem,nosocket androidboot.init_fatal_reboot_target=recovery androidboot.hardware=timelm"
          scripts/config --file $SEARCH_CONF --enable CONFIG_CMDLINE_EXTEND
          
          # Parche para orphan-handling
          sed -i 's/--orphan-handling=warn//g' scripts/Makefile.extrawarn || true

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: make ${{ steps.generate-args.outputs.args }} ${{ env.FINAL_CONF }}

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: make ${{ steps.generate-args.outputs.args }}

      - name: "💛 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-LGV60-timelm
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz-dtb
