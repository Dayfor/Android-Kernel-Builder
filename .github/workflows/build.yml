name: "Build kernels #134 - Final Hack"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 V60 Android 16 Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Instalación de Herramientas"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential curl git libpcre3-dev \
          libssl-dev lzop zlib1g-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          checkpolicy bison flex libncurses5-dev python3 libarchive-tools \
          clang lld llvm

      - name: "🌟 Clonando Fuente (Rama 23.2)"
        run: |
          git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_lge_sm8250 kernel_src --depth=1

      - name: "🛠️ Compilación con Inyección de Tipos"
        working-directory: ./kernel_src
        run: |
          LLD_PATH=$(which ld.lld)
          
          ARGS="ARCH=arm64 \
                LLVM=1 \
                LLVM_IAS=1 \
                CC=clang \
                LD=$LLD_PATH \
                AR=llvm-ar \
                NM=llvm-nm \
                OBJCOPY=llvm-objcopy \
                OBJDUMP=llvm-objdump \
                STRIP=llvm-strip \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi-"
          
          echo "📝 Configurando..."
          make $ARGS defconfig
          
          echo "🚀 Iniciando build con inyección de headers..."
          # EXPLICACIÓN DEL TRUCO:
          # Usamos '-D' para definir el enum mmu_notifier_event globalmente.
          # Esto engaña al compilador y le da la definición que le falta sin editar el archivo .h
          FIX_ENUM="-Denum_mmu_notifier_event=int -DMMU_NOTIFIER_RELEASE=0 -DMMU_NOTIFIER_UNMAP=1"
          
          # Flags de compatibilidad agresivos
          export KCFLAGS="$FIX_ENUM -Wno-error -Wno-visibility -Wno-incompatible-function-pointer-types -Wno-implicit-function-declaration"
          
          make -j$(nproc --all) $ARGS KCFLAGS="$KCFLAGS"

      - name: "📦 Exportar"
        if: always()
        run: |
          mkdir -p dist
          if [ -d "kernel_src/arch/arm64/boot" ]; then
            find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
            find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          fi

      - name: "📤 Subiendo Artefactos"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-L23.2-Final"
          path: dist/
