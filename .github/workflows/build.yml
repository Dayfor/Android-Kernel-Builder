name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools libdebuginfod-dev jq

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch ${{ env.kernelBranch }} ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1 || \
          git clone --recursive ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1

      - name: "💉 Aplicar Parche NTSYNC y Requisitos Android 15"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          # Fuente estable: Community patches de Frogging Family (TKG) para Linux 4.19
          echo "Buscando parche ntsync..."
          curl -Lo ntsync.patch https://raw.githubusercontent.com/frogging-family/community-patches/master/linux419-tkg/0007-v6.7-ntsync.patch || \
          curl -Lo ntsync.patch https://raw.githubusercontent.com/Gr-some7/ntsync-patch/main/ntsync_4.19.patch
          
          if [ -f ntsync.patch ] && [ -s ntsync.patch ]; then
            echo "Aplicando parche al código fuente..."
            patch -p1 --ignore-whitespace < ntsync.patch || echo "Aviso: El parche no encajó perfectamente, se activará vía defconfig."
          else
            echo "⚠️ No se pudo descargar un archivo .patch válido. Activando compatibilidad manual..."
          fi
          
          # Forzar configuración en el defconfig para Android 15
          REAL_CONFIG=$(find arch/arm64/configs/ -name "*lito*" | grep "perf" | head -n 1)
          
          if [ -n "$REAL_CONFIG" ]; then
            echo "Inyectando parámetros críticos en $REAL_CONFIG"
            # Limpieza de flags antiguos para evitar duplicados que rompan la compilación
            sed -i '/CONFIG_NTSYNC/d' "$REAL_CONFIG"
            sed -i '/CONFIG_ANDROID_BINDER/d' "$REAL_CONFIG"
            sed -i '/CONFIG_BPF_SYSCALL/d' "$REAL_CONFIG"
            
            {
              echo "CONFIG_NTSYNC=y"
              echo "CONFIG_BPF_SYSCALL=y"
              echo "CONFIG_USERFAULTFD=y"
              echo "CONFIG_MEMBARRIER=y"
              echo "CONFIG_ANDROID_BINDER_IPC=y"
              echo "CONFIG_ANDROID_BINDERFS=y"
            } >> "$REAL_CONFIG"
          else
            echo "❌ Error: No se encontró el archivo de configuración defconfig."
            exit 1
          fi

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --branch $branch $repo $name --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          mkdir -p $(pwd)/${{ env.OUT_DIR }}
          BUILD_ARGS="ARCH=arm64 CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE") CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_ARM32") O=$(pwd)/${{ env.OUT_DIR }}"
          BUILD_ARGS="$BUILD_ARGS CC=clang CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")"
          BUILD_ARGS="$BUILD_ARGS NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip"
          echo "args=-j2 $BUILD_ARGS" >> $GITHUB_OUTPUT

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          CONF_NAME=$(find arch/arm64/configs/ -name "*lito*" | grep "perf" | head -n 1 | sed 's|arch/arm64/configs/||')
          if [ -z "$CONF_NAME" ]; then
            CONF_NAME="vendor/lito-perf_defconfig"
          fi
          echo "Usando configuración: $CONF_NAME"
          make ${{ steps.generate-args.outputs.args }} $CONF_NAME

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: make ${{ steps.generate-args.outputs.args }}

      - name: "💛 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-LGV60-Lineage-NTSYNC
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image*
          
