name: "Kernel Build: NTSYNC Edition A15"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parsear repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generar Matriz"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Compilar Kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      kernelDevice: "${{ matrix.repos.kernelSource.device }}"
      DEFCONFIG_NAME: "${{ matrix.repos.kernelSource.device }}_defconfig"
      withKernelSU: "${{ matrix.repos.withKernelSU }}"
      
    steps:
      - name: "✨ Preparar entorno"
        run: mkdir -p "${{ env.kernelDir }}"

      - name: "⭐ Instalar dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz && cd Python-2.7.18
          ./configure --prefix=/usr/local --enable-shared LDFLAGS="-Wl,-rpath /usr/local/lib"
          make -j$(nproc) && sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          cd .. && rm -rf Python-2.7.18*

      - name: "🌟 Clonar Kernel"
        working-directory: "./${{ env.kernelDir }}"
        run: git clone --recursive --branch "${{ env.kernelBranch }}" "${{ env.kernelRepo }}" "${{ env.kernelName }}" --depth=1

      - name: "💫 Descargar Toolchains"
        working-directory: "./${{ env.kernelDir }}"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1 || git clone --recursive "$repo" "$name" --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "📥 Inyectar código NTSYNC"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          mkdir -p include/uapi/linux
          curl -LSs "https://raw.githubusercontent.com/torvalds/linux/master/drivers/misc/ntsync.c" -o drivers/misc/ntsync.c
          curl -LSs "https://raw.githubusercontent.com/torvalds/linux/master/include/uapi/linux/ntsync.h" -o include/uapi/linux/ntsync.h
            
      - name: "🛠️ Parches Android 15 + NTSYNC"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          # 1. Limpiar archivos originales
          git checkout drivers/android/Makefile drivers/misc/Makefile drivers/misc/Kconfig

          # 2. Registrar NTSYNC en Makefile con Tabulador real
          if ! grep -q "ntsync.o" drivers/misc/Makefile; then
            printf "\nobj-\$(CONFIG_NTSYNC) += ntsync.o\n" >> drivers/misc/Makefile
          fi
          
          # 3. Inyectar Kconfig
          if ! grep -q "config NTSYNC" drivers/misc/Kconfig; then
            echo "config NTSYNC" > ntsync_entry
            echo -e "\ttristate \"Windows-compatible synchronization primitives\"" >> ntsync_entry
            echo -e "\tdefault y" >> ntsync_entry
            echo -e "\thelp" >> ntsync_entry
            echo -e "\t  Soporte para Proton y Windows Sync (NTSYNC)." >> ntsync_entry
            sed -i '/menu "Misc devices"/r ntsync_entry' drivers/misc/Kconfig
            rm ntsync_entry
          fi

          # 4. Fix Energía SMB5 (LG V60)
          SMB5_FILE=$(find . -name "qpnp-smb5.c" | head -n 1)
          if [ -n "$SMB5_FILE" ]; then
            sed -i 's/__lpd_ux/chg->lpd_ux/g' "$SMB5_FILE"
            sed -i 's/__lpd_disabled_global/chg->lpd_disabled_global/g' "$SMB5_FILE"
          fi

          # 5. Global: Desactivar -Werror
          find . -type f -name "Makefile*" -o -name "Kbuild*" | xargs sed -i 's/-Werror//g'

      - name: "😎 Configurar Argumentos"
        id: generate-args
        working-directory: "./${{ env.kernelDir }}"
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo "$params" | jq -r ".ARCH")
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          args="-j$(nproc --all) O=$(pwd)/${{ env.OUT_DIR }} ARCH=$ARCH"
          for key in CROSS_COMPILE CLANG_TRIPLE CROSS_COMPILE_ARM32 AR CC LD NM OBJCOPY OBJDUMP STRIP LLVM LLVM_IAS; do
            val=$(echo "$params" | jq -r ".$key")
            if [ "$val" != "null" ]; then args="$args $key=$val"; fi
          done
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "😋 Integrar KernelSU"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        if: ${{ env.withKernelSU == 'true' }}
        run: curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
     
      - name: "🎶 Generar defconfig"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: make ${{ steps.generate-args.outputs.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🎶 Compilar Kernel"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          # Limpiamos CFLAGS que puedan venir corruptas del entorno
          export KCFLAGS="-Wno-everything"
          export KBUILD_CFLAGS_KERNEL="-Wno-everything"
          export KBUILD_CFLAGS="-Wno-everything"
          
          # Ejecutamos make protegiendo los argumentos con comillas
          make ${{ steps.generate-args.outputs.args }} KCFLAGS="$KCFLAGS"

      - name: "📤 Subir Artefactos"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-NTSYNC-A15-${{ env.kernelDevice }}-${{ env.kernelBranch }}"
          path: "./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz-dtb"
