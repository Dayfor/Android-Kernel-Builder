name: "Build kernels #134 - LLD Fix"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 V60 Android 16 Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Instalación Completa de LLVM/LLD"
        run: |
          sudo apt-get update
          # Instalamos lld y llvm explícitamente
          sudo apt-get install -y bc build-essential curl git libpcre3-dev \
          libssl-dev lzop zlib1g-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          checkpolicy bison flex libncurses5-dev python3 libarchive-tools \
          clang lld llvm

      - name: "🌟 Clonando Fuente (Rama 23.2)"
        run: |
          git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_lge_sm8250 kernel_src --depth=1

      - name: "🛠️ Configuración de Enlazador y Compilación"
        working-directory: ./kernel_src
        run: |
          # Crear enlaces simbólicos si no existen para asegurar que ld.lld sea ejecutable
          sudo ln -sf /usr/bin/ld.lld /usr/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-objcopy /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-ar /usr/bin/llvm-ar

          ARGS="ARCH=arm64 \
                CC=clang \
                LD=ld.lld \
                AR=llvm-ar \
                NM=llvm-nm \
                OBJCOPY=llvm-objcopy \
                OBJDUMP=llvm-objdump \
                STRIP=llvm-strip \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                LLVM=1 \
                LLVM_IAS=1"
          
          echo "📝 Configurando con defconfig..."
          make $ARGS defconfig
          
          echo "🚀 Iniciando build..."
          # Mantenemos los flags de compatibilidad para el error del enum mmu_notifier
          export KCFLAGS="-Wno-error -Wno-visibility -Wno-incompatible-function-pointer-types -Wno-implicit-function-declaration"
          
          make -j$(nproc --all) $ARGS KCFLAGS="$KCFLAGS"

      - name: "📦 Exportar"
        if: always()
        run: |
          mkdir -p dist
          if [ -d "kernel_src/arch/arm64/boot" ]; then
            find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
            find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          fi

      - name: "📤 Subiendo Artefactos"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-L23.2-LLD-Fixed"
          path: dist/
