name: "Build kernels #119 - Pure Test v3"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  Set-repos: 
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel (Pure)"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "${{ env.kernelDir }}"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev
          
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz && cd Python-2.7.18
          ./configure --prefix=/usr/local --enable-shared LDFLAGS="-Wl,-rpath /usr/local/lib"
          make -j$(nproc) && sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          cd .. && rm -rf Python-2.7.18*

      - name: "🌟 Clone kernel source"
        working-directory: "./${{ env.kernelDir }}"
        run: git clone --recursive --branch "${{ env.kernelBranch }}" "${{ env.kernelRepo }}" "${{ env.kernelName }}" --depth=1

      - name: "💫 Get toolchains & Fix PATH"
        working-directory: "./${{ env.kernelDir }}"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            
            echo "📥 Clonando $name desde $repo..."
            git clone --branch "$branch" "$repo" "$name" --depth=1
            
            # Buscamos la carpeta bin de forma recursiva (vital para Clang)
            BIN_PATH=$(find $(pwd)/$name -type d -name "bin" | head -n 1)
            if [ -n "$BIN_PATH" ]; then
              echo "✅ Añadiendo al PATH: $BIN_PATH"
              echo "$BIN_PATH" >> $GITHUB_PATH
            else
              echo "✅ Añadiendo al PATH: $(pwd)/$name"
              echo "$(pwd)/$name" >> $GITHUB_PATH
            fi
          done

      - name: "😎 Set args"
        id: generate-args
        working-directory: "./${{ env.kernelDir }}"
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          args="ARCH=arm64 O=$(pwd)/${{ env.OUT_DIR }} LLVM=1 LLVM_IAS=1"
          for key in CROSS_COMPILE CLANG_TRIPLE CROSS_COMPILE_ARM32; do
            val=$(echo "$params" | jq -r ".$key")
            if [ "$val" != "null" ]; then args="$args $key=$val"; fi
          done
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "🛠️ Compilación Final"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          # Detectar defconfig dinámicamente
          CONF_NAME="${{ matrix.repos.kernelSource.device }}_defconfig"
          CONF_PATH=$(find arch/arm64/configs/ -name "$CONF_NAME" | sed 's|arch/arm64/configs/||' | head -n 1)

          if [ -z "$CONF_PATH" ]; then
            echo "❌ ERROR: No se encontró $CONF_NAME"
            exit 1
          fi

          echo "✅ Usando: $CONF_PATH"
          make ${{ steps.generate-args.outputs.args }} "$CONF_PATH"
          
          # Build pura: Sin NTSYNC y sin parches para validar el source
          make -j$(nproc --all) ${{ steps.generate-args.outputs.args }}

      - name: "📤 Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-Pure-B119-V3-${{ github.run_number }}"
          path: |
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image*
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/dtbo.img
