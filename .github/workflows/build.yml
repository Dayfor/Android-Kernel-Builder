name: "🚀 Compilador Kernel: Android 15 + NTSYNC"

on:
  workflow_dispatch:

env:
  kernelName: "kernel_lge_sm8250"
  kernelDir: "source"
  OUT_DIR: "out"
  # Ajusta el DEFCONFIG según el nombre exacto en tu repo (lito-perf_defconfig es el estándar)
  DEFCONFIG: "vendor/lito-perf_defconfig"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "📦 Clonar Repositorio"
        uses: actions/checkout@v4

      - name: "🛠️ Instalar Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld jq patch

      - name: "⚙️ Configurar Toolchain (Dayfor Style)"
        id: generate-args
        run: |
          echo "args=ARCH=arm64 \
          LLVM=1 \
          LLVM_IAS=1 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          KCFLAGS='-Wno-error' \
          -j$(nproc --all)" >> $GITHUB_OUTPUT

      - name: "💉 Aplicar Parches y Adaptación Android 15"
        working-directory: ./${{ env.kernelDir }}
        run: |
          # 1. Parche para registrar NTSYNC en el sistema de configuración
          cat <<EOF > ntsync
          
