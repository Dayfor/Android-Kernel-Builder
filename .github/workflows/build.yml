name: "Kernel Build: NTSYNC Edition"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "kernel_workspace"
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      kernelDevice: "${{ matrix.repos.kernelSource.device }}"
      DEFCONFIG_NAME: "${{ matrix.repos.kernelSource.device }}_defconfig"
      withKernelSU: "${{ matrix.repos.withKernelSU }}"
      
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "$kernelDir"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools jq patch libncurses5-dev

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --branch "$kernelBranch" "$kernelRepo" "$kernelName" --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --branch "$branch" "$repo" "$name" --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "🛠️ Apply NTSYNC Patches & Fixes"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          # 1. Crear estructura física de NTSYNC
          mkdir -p drivers/android/ntsync
          mkdir -p include/uapi/linux

          # Inyectar Header NTSYNC (Base64)
          echo "" | base64 -d > include/uapi/linux/ntsync.h

          # Inyectar Source NTSYNC (Base64)
          echo "  " | base4 -d > drivers/android/ntsync/ntsync.c

          # 2. Registrar el driver en los Makefiles
          echo 'obj-$(CONFIG_NTSYNC) += ntsync.o' > drivers/android/ntsync/Makefile
          echo 'obj-$(CONFIG_NTSYNC) += ntsync/' >> drivers/android/Makefile

          # 3. Inyectar en Kconfig de Android
          KCONFIG_FILE=$(find drivers/android/ -name "Kconfig" | head -n 1)
          if ! grep -q "config NTSYNC" "$KCONFIG_FILE"; then
            sed -i '/config ANDROID_BINDERFS/i config NTSYNC\n\ttristate "Windows-compatible synchronization primitives"\n\tdefault y\n' "$KCONFIG_FILE"
          fi

          # 4. Habilitar en defconfig del LG V60
          CONF_PATH="./arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          if [ -f "$CONF_PATH" ]; then
            echo "CONFIG_NTSYNC=y" >> "$CONF_PATH"
          fi

          # 5. Fixes de energía y limpieza de -Werror (Evita Error 2)
          find . -name "qpnp-smb5.c" -exec sed -i 's/__lpd_ux/chg->lpd_ux/g' {} +
          find . -name "qpnp-smb5.c" -exec sed -i 's/__lpd_disabled_global/chg->lpd_disabled_global/g' {} +
          find . -type f \( -name "Makefile*" -o -name "Kbuild*" \) -exec sed -i 's/-Werror//g' {} +

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo "$params" | jq -r ".ARCH")
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          args="-j$(nproc --all) O=$(pwd)/../../${{ env.OUT_DIR }} ARCH=$ARCH KCFLAGS='-Wno-error -Wno-implicit-function-declaration'"
          
          for key in CROSS_COMPILE CLANG_TRIPLE CROSS_COMPILE_ARM32 AR CC LD NM OBJCOPY OBJDUMP STRIP LLVM LLVM_IAS; do
            val=$(echo "$params" | jq -r ".$key")
            if [ "$val" != "null" ]; then args="$args $key=$val"; fi
          done
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: "👍 Build"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          make ${{ steps.generate-args.outputs.args }} ${{ env.DEFCONFIG_NAME }}
          make ${{ steps.generate-args.outputs.args }}

      - name: "📤 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-NTSYNC-${{ env.kernelDevice }}"
          path: ./${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz-dtb
