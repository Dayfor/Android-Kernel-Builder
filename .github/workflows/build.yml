name: "Kernel Build: NTSYNC Edition"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          {
            echo "repos<<EOF"
            cat "${{ env.CONFIGURATION }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools jq patch

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
        run: |
          git clone --recursive --branch "${{ matrix.repos.kernelSource.branch }}" "${{ matrix.repos.kernelSource.repo }}" "${{ matrix.repos.kernelSource.name }}" --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
        env:
          TC_JSON: ${{ toJSON(matrix.repos.toolchains) }}
        run: |
          echo "$TC_JSON" | jq -c '.[]' | while read -r i; do
            name=$(echo "$i" | jq -r '.name')
            repo=$(echo "$i" | jq -r '.repo')
            branch=$(echo "$i" | jq -r '.branch')
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1
            echo "$(pwd)/$name/bin" >> "$GITHUB_PATH"
          done

      - name: "🛠️ Apply NTSYNC Patches & Fixes"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ matrix.repos.kernelSource.name }}
        run: |
          # 1. Fix variables de energía
          SMB5_FILE=$(find . -name "qpnp-smb5.c" | head -n 1)
          if [ -n "$SMB5_FILE" ]; then
            sed -i 's/__lpd_ux/chg->lpd_ux/g' "$SMB5_FILE"
            sed -i 's/__lpd_disabled_global/chg->lpd_disabled_global/g' "$SMB5_FILE"
          fi

          # 2. Inyectar NTSYNC en Kconfig
          KCONFIG_FILE=$(find drivers/android/ -name "Kconfig" | head -n 1)
          if [ -n "$KCONFIG_FILE" ] && ! grep -q "config NTSYNC" "$KCONFIG_FILE"; then
            sed -i '/config ANDROID_BINDERFS/i source "drivers/android/ntsync/Kconfig"' "$Kconfig" || \
            sed -i '$a source "drivers/android/ntsync/Kconfig"' "$KCONFIG_FILE"
            mkdir -p drivers/android/ntsync
            echo -e 'config NTSYNC\n\ttristate "NTSYNC support"\n\thelp\n\t  Windows NT sync primitives.' > drivers/android/ntsync/Kconfig
          fi

          # 3. Habilitar en defconfig
          CONF_PATH="./arch/arm64/configs/${{ matrix.repos.kernelSource.device }}_defconfig"
          if [ -f "$CONF_PATH" ]; then
            sed -i '/CONFIG_NTSYNC/d' "$CONF_PATH"
            echo "CONFIG_NTSYNC=y" >> "$CONF_PATH"
          fi

          # 4. Quitar Werror
          find . -name "Makefile*" -o -name "Kbuild*" | xargs sed -i 's/-Werror//g'

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
        env:
          PARAMS: ${{ toJSON(matrix.repos.params) }}
        run: |
          ARCH=$(echo "$PARAMS" | jq -r '.ARCH')
          echo "ARCH=$ARCH" >> "$GITHUB_ENV"
          
          ARGS="-j$(nproc --all) ARCH=$ARCH O=$(pwd)/${{ env.OUT_DIR }}"
          
          # Extraer dinámicamente el resto de parámetros
          VARS=$(echo "$PARAMS" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"')
          for entry in $VARS; do
            if [[ ! $entry =~ "ARCH=" ]]; then
              ARGS="$ARGS $entry"
            fi
          done
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: "😋 Update KernelSU"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ matrix.repos.kernelSource.name }}
        if: ${{ matrix.repos.withKernelSU == 'true' }}
        run: curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: "👍 Make defconfig"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ matrix.repos.kernelSource.name }}
        run: make ${{ steps.generate-args.outputs.args }} ${{ matrix.repos.kernelSource.device }}_defconfig

      - name: "🎶 Build kernel"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ matrix.repos.kernelSource.name }}
        run: make ${{ steps.generate-args.outputs.args }} KCFLAGS="-Wno-error"

      - name: "📤 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-NTSYNC-${{ matrix.repos.kernelSource.device }}"
          path: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz-dtb

