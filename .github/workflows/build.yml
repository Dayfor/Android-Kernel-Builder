name: "Build kernels #134 - Legacy Clang Test"

env:
  CONFIGURATION: "repos.json"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 Legacy Clang Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Clean"
        run: rm -rf *

      - name: "📦 Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev clang lld llvm

      - name: "🌟 Clone Source"
        run: git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_lge_sm8250 kernel_src --depth=1

      - name: "💫 Setup Legacy Clang"
        run: |
          # Usamos una versión de Clang que Lineage usaba para kernels 4.19
          git clone --branch lineage-19.1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b1 clang-stable --depth=1
          echo "$(pwd)/clang-stable/bin" >> $GITHUB_PATH

      - name: "🛠️ Compilación"
        working-directory: ./kernel_src
        run: |
          # Usamos la toolchain descargada
          ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTCXX=g++"
          
          make $ARGS defconfig
          
          # Añadimos flags de compatibilidad por si acaso, pero sin tocar archivos
          export KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-strict-prototypes"
          
          echo "🚀 Compilando con Clang Legacy..."
          make -j$(nproc --all) $ARGS
