name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      kernelDevice: "${{ matrix.repos.kernelSource.device }}"
      DEFCONFIG_NAME: "${{ matrix.repos.kernelSource.device }}_defconfig"
      withKernelSU: "${{ matrix.repos.withKernelSU }}"
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p ${{ env.kernelDir }}

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev zstd wget libfl-dev python3 libarchive-tools jq

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --branch ${{ env.kernelBranch }} ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1

      - name: "💫 Get toolchains & Fix PATH"
        working-directory: ./${{ env.kernelDir }}
        run: |
          echo '${{ toJSON(matrix.repos.toolchains) }}' > toolchains.json
          toolchains_num=$(jq 'length' toolchains.json)
          for ((i=0; i<toolchains_num; i++)); do
            name=$(jq -r ".[$i].name" toolchains.json)
            repo=$(jq -r ".[$i].repo" toolchains.json)
            branch=$(jq -r ".[$i].branch" toolchains.json)
            git clone --branch "$branch" "$repo" "$name" --depth=1
            BIN_PATH=$(find "$(pwd)/$name" -type d -name "bin" | head -n 1)
            if [ -n "$BIN_PATH" ]; then
              echo "$BIN_PATH" >> $GITHUB_PATH
            fi
          done

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        run: |
          echo '${{ toJSON(matrix.repos.params) }}' > params.json
          ARCH=$(jq -r ".ARCH" params.json)
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          
          ARGS="-j$(nproc --all) O=$(pwd)/${{ env.OUT_DIR }} ARCH=$ARCH LLVM=1 LLVM_IAS=1"
          ARGS="$ARGS CC=clang CLANG_TRIPLE=$(jq -r ".CLANG_TRIPLE" params.json)"
          ARGS="$ARGS CROSS_COMPILE=$(jq -r ".CROSS_COMPILE" params.json)"
          ARGS="$ARGS CROSS_COMPILE_ARM32=$(jq -r ".CROSS_COMPILE_COMPAT" params.json)"
          ARGS="$ARGS AR=$(jq -r ".AR" params.json)"
          
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: "🔧 Sync & Patch Kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          # 1. Parche para orphan-handling
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.mak" \) -exec sed -i 's/--orphan-handling=warn//g' {} + || true
          
          # 2. Localizar defconfig
          if [ -f "arch/arm64/configs/vendor/${{ env.DEFCONFIG_NAME }}" ]; then
            SEARCH_CONF="vendor/${{ env.DEFCONFIG_NAME }}"
          elif [ -f "arch/arm64/configs/${{ env.DEFCONFIG_NAME }}" ]; then
            SEARCH_CONF="${{ env.DEFCONFIG_NAME }}"
          else
            SEARCH_CONF="defconfig"
          fi
          echo "FINAL_CONF=$SEARCH_CONF" >> $GITHUB_ENV
          
          # 3. Inyectar CMDLINE personalizada
          MY_CMDLINE="androidboot.memcg=1 video=vfb:640x400,bpp=32,memsize=3072000 lpm_levels.sleep_disabled=1 msm_rtb.filter=0x237 service_locator.enable=1 swiotlb=2048 loop.max_part=7 androidboot.usbcontroller=a600000.dwc3 kpti=off cgroup.memory=nokmem,nosocket androidboot.init_fatal_reboot_target=recovery androidboot.hardware=timelm"
          chmod +x scripts/config
          ./scripts/config --file arch/arm64/configs/$SEARCH_CONF --set-str CONFIG_CMDLINE "$MY_CMDLINE"
          ./scripts/config --file arch/arm64/configs/$SEARCH_CONF --enable CONFIG_CMDLINE_EXTEND

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: make ${{ steps.generate-args.outputs.args }} ${{ env.FINAL_CONF }}

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: make ${{ steps.generate-args.outputs.args }}

      - name: "💛 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-LGV60-${{ matrix.repos.kernelSource.device }}
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image*
