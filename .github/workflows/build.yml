name: "Kernel Build: LG V60 NTSYNC"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "lgv60_rofikkernel"
      kernelName: "lgv60_nextgen"
      # Ajusta el defconfig según el nombre exacto en arch/arm64/configs/ del repo
      DEFCONFIG_NAME: "v60_defconfig" 
      
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "$kernelDir"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools jq patch libncurses5-dev
          sudo ln -sf /usr/bin/python3 /usr/bin/python || true

      - name: "🌟 Clone rofikkernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive https://github.com/rofikkerneldev/lgv60nextgen_rofikkernel "$kernelName" --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1
            
            if [ -d "$PWD/$name/bin" ]; then
              echo "$PWD/$name/bin" >> $GITHUB_PATH
            else
              echo "$PWD/$name" >> $GITHUB_PATH
            fi
          done

      - name: "🛠️ Apply NTSYNC & Fixes"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
