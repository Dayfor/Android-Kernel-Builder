name: "Build kernels - NTSYNC ONLY"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos=$(cat ${{ env.CONFIGURATION }} | jq -c .)" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    
    steps:
      - name: "✨ Setup workspace"
        run: |
          echo "KDIR=${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}" >> $GITHUB_ENV
          echo "KNAME=${{ matrix.repos.kernelSource.name }}" >> $GITHUB_ENV

      - name: "⭐ Prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu libssl-dev jq patch

      - name: "🌟 Clone Source"
        run: |
          mkdir -p ${{ env.KDIR }}
          cd ${{ env.KDIR }}
          git clone --branch ${{ matrix.repos.kernelSource.branch }} ${{ matrix.repos.kernelSource.repo }} ${{ env.KNAME }} --depth=1

      - name: "💫 Get Toolchains"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
        env:
          TC_JSON: ${{ toJSON(matrix.repos.toolchains) }}
        run: |
          echo "$TC_JSON" | jq -c '.[]' | while read -r tc; do
            name=$(echo $tc | jq -r '.name')
            repo=$(echo $tc | jq -r '.repo')
            branch=$(echo $tc | jq -r '.branch')
            git clone --branch "$branch" "$repo" "$name" --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "🛠️ Patch NTSYNC"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ env.KNAME }}
        run: |
          # 1. Inyectar soporte NTSYNC en Kconfig (Método seguro)
          KCONFIG_ANDROID=$(find drivers/android/ -name "Kconfig" | head -n 1)
          if [ -n "$KCONFIG_ANDROID" ]; then
            sed -i '/config ANDROID_BINDERFS/i config NTSYNC\n\ttristate "NTSYNC support"\n\thelp\n\t  Windows NT synchronization primitives.' "$KCONFIG_ANDROID"
          fi

          # 2. Habilitar en defconfig
          CONF_PATH="arch/arm64/configs/${{ matrix.repos.kernelSource.device }}_defconfig"
          if [ -f "$CONF_PATH" ]; then
            echo "CONFIG_NTSYNC=y" >> "$CONF_PATH"
          fi

          # 3. Quitar Werror para evitar Error 2 por warnings
          find . -name "Makefile*" -o -name "Kbuild*" | xargs sed -i 's/-Werror//g'

      - name: "😎 Set Args"
        id: generate-args
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
        env:
          P_JSON: ${{ toJSON(matrix.repos.params) }}
        run: |
          ARCH=$(echo "$P_JSON" | jq -r '.ARCH')
          ARGS="-j$(nproc --all) ARCH=$ARCH O=$(pwd)/${{ env.OUT_DIR }}"
          
          # Extraer el resto de parámetros del JSON de forma segura
          EXTRA_VARS=$(echo "$P_JSON" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"')
          for var in $EXTRA_VARS; do
            if [[ ! $var =~ "ARCH=" ]]; then
              ARGS="$ARGS $var"
            fi
          done
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: "👍 Make Config"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ env.KNAME }}
        run: make ${{ steps.generate-args.outputs.args }} ${{ matrix.repos.kernelSource.device }}_defconfig

      - name: "🎶 Build"
        working-directory: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ env.KNAME }}
        run: make ${{ steps.generate-args.outputs.args }} KCFLAGS="-Wno-error"

      - name: "📤 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-NTSYNC-${{ matrix.repos.kernelSource.device }}"
          path: ./${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz-dtb
          
