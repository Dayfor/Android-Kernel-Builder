name: "Build kernels #134 - Fix Mmu Notifier"

env:
  CONFIGURATION: "repos.json"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 Compilando Kernel V60"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Instalación de Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev clang lld llvm

      - name: "🌟 Clonando Fuente (Rama 23.2)"
        run: git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_lge_sm8250 kernel_src --depth=1

      - name: "💫 Configurando Clang AOSP"
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp --depth=1
          echo "$(pwd)/clang-aosp/bin" >> $GITHUB_PATH

      - name: "🔧 Aplicar Fixes de Compilador"
        working-directory: ./kernel_src
        run: |
          echo "🛠️ Corrigiendo mmu_notifier.h para Clang moderno..."
          # Insertamos la definición del enum antes de la línea que da el error
          sed -i '340i enum mmu_notifier_event { MMU_NOTIFIER_UNMAP, MMU_NOTIFIER_RELEASE, };' include/linux/mmu_notifier.h
          
          # Fix adicional para evitar errores de indentación en drivers de LG
          export KCFLAGS="-Wno-error -Wno-misleading-indentation -Wno-incompatible-function-pointer-types -Wno-visibility"

      - name: "🛠️ Compilación Final"
        working-directory: ./kernel_src
        run: |
          ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTCXX=g++"
          
          echo "📝 Cargando defconfig..."
          make $ARGS defconfig
          
          echo "🚀 Iniciando compilación de Image..."
          make -j$(nproc --all) $ARGS KCFLAGS="-Wno-error -Wno-visibility"

      - name: "📦 Organizando Archivos"
        if: always()
        run: |
          mkdir -p dist
          find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
          find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;

      - name: "📤 Subiendo Artefactos"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-Lineage23-B134-Fixed"
          path: dist/
