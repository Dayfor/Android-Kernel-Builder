name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos: 
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      kernelDevice: "${{ matrix.repos.kernelSource.device }}"
      DEFCONFIG_NAME: "${{ matrix.repos.kernelSource.device }}_defconfig"
      withKernelSU: "${{ matrix.repos.withKernelSU }}"
      
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "${{ env.kernelDir }}"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch libarchive-tools
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz && cd Python-2.7.18
          ./configure --prefix=/usr/local --enable-shared LDFLAGS="-Wl,-rpath /usr/local/lib"
          make -j$(nproc) && sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          cd .. && rm -rf Python-2.7.18*

      - name: "🌟 Clone kernel source"
        working-directory: "./${{ env.kernelDir }}"
        run: git clone --recursive --branch "${{ env.kernelBranch }}" "${{ env.kernelRepo }}" "${{ env.kernelName }}" --depth=1

      - name: "💫 Get toolchains"
        working-directory: "./${{ env.kernelDir }}"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1 || git clone --recursive "$repo" "$name" --depth=1
            [ -d "$(pwd)/$name/bin" ] && echo "$(pwd)/$name/bin" >> $GITHUB_PATH || echo "$(pwd)/$name" >> $GITHUB_PATH
          done

      - name: "😎 Set args"
        id: generate-args
        working-directory: "./${{ env.kernelDir }}"
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo "$params" | jq -r ".ARCH // \"arm64\"")
          args="ARCH=$ARCH O=$(pwd)/${{ env.OUT_DIR }} LLVM=1 LLVM_IAS=1"
          args="$args KCFLAGS=\"-Wno-error -Wno-implicit-function-declaration -Wno-unknown-warning-option -Wno-ignored-optimization-argument -Wno-unused-command-line-argument\""
          
          for key in CROSS_COMPILE CLANG_TRIPLE CROSS_COMPILE_ARM32 AR CC LD NM OBJCOPY OBJDUMP STRIP; do
            val=$(echo "$params" | jq -r ".$key")
            if [ "$val" != "null" ]; then args="$args $key=$val"; fi
          done
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "📥 Inject NTSYNC (Force 4.19 Skeleton)"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          mkdir -p drivers/android/ntsync
          mkdir -p include/uapi/linux
          curl -LSs "https://raw.githubusercontent.com/torvalds/linux/master/include/uapi/linux/ntsync.h" -o include/uapi/linux/ntsync.h
          
          cat <<EOF > drivers/android/ntsync/ntsync.c
          #include <linux/file.h>
          #include <linux/fs.h>
          #include <linux/miscdevice.h>
          #include <linux/module.h>
          #include <linux/slab.h>
          #include <linux/uaccess.h>
          #include <uapi/linux/ntsync.h>

          static long ntsync_char_ioctl(struct file *file, unsigned int cmd, unsigned long arg) {
              return -ENOTTY;
          }

          static const struct file_operations ntsync_device_fops = {
              .owner          = THIS_MODULE,
              .unlocked_ioctl = ntsync_char_ioctl,
              .compat_ioctl   = NULL,
          };

          int ntsync_init(void) { return 0; }
          void ntsync_exit(void) { }

          module_init(ntsync_init);
          module_exit(ntsync_exit);
          MODULE_LICENSE("GPL v2");
          EOF

          echo "obj-y += ntsync.o" > drivers/android/ntsync/Makefile

      - name: "🛠️ Fix & Patch (ARM64, ESOC, HID & LG V60)"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          git checkout Makefile arch/arm64/Makefile
          
          # 1. Limpieza de flags incompatibles
          find . -type f -name "Makefile*" -exec sed -i 's/-fno-inline-functions-called-once//g' {} +
          find . -type f -name "Makefile*" -exec sed -i 's/-fmerge-constants//g' {} +
          find . -type f -name "Makefile*" -exec sed -i 's/-fno-asynchronous-unwind-tables//g' {} +
          
          # 2. Desactivar WERROR globalmente
          find . -type f -name "Makefile*" -exec sed -i 's/-Werror//g' {} +
          find . -type f -name "Kbuild*" -exec sed -i 's/-Werror//g' {} +
          
          # 3. FIX ESOC (Borrado de macro defectuosa)
          ESOC_H="drivers/esoc/esoc.h"
          if [ -f "$ESOC_H" ]; then
            sed -i '35,45d' "$ESOC_H"
          fi
          
          # 4. FIX HID-MULTITOUCH (Error Build #101)
          HID_MT="drivers/hid/hid-multitouch.c"
          if [ -f "$HID_MT" ]; then
            sed -i 's/TOUCH_D(ABS/\/\/ TOUCH_D(ABS/g' "$HID_MT"
          fi
          
          # 5. Parche vdso.S (Clang alignment)
          if [ -f "arch/arm64/kernel/vdso/vdso.S" ]; then
            sed -i 's/p2align 3/p2align 2/g' arch/arm64/kernel/vdso/vdso.S
          fi
          
          # 6. Inyectar NTSYNC en el Makefile de Android
          if ! grep -q "ntsync" drivers/android/Makefile; then
            echo "obj-y += ntsync/" >> drivers/android/Makefile
          fi
          
          # 7. Fix Sensores LG V60 (SMB5)
          SMB5_FILE=$(find . -name "qpnp-smb5.c" | head -n 1)
          if [ -n "$SMB5_FILE" ]; then
            sed -i 's/__lpd_ux/chg->lpd_ux/g' "$SMB5_FILE"
            sed -i 's/__lpd_disabled_global/chg->lpd_disabled_global/g' "$SMB5_FILE"
          fi

      - name: "😋 Update KernelSU"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          CONF="./arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          sed -i '/CONFIG_KPROBES/d' "$CONF"
          echo -e "CONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> "$CONF"

      - name: "🛠️ Compilación Final"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          make -j$(nproc --all) ${{ steps.generate-args.outputs.args }} ${{ env.DEFCONFIG_NAME }}
          make -j$(nproc --all) ${{ steps.generate-args.outputs.args }} || make -j1 ${{ steps.generate-args.outputs.args }}

      - name: "📤 Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-${{ env.kernelDevice }}-${{ github.run_number }}"
          path: |
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image*
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/dtb*
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/dtbo.img
