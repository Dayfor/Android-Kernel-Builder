name: "Build kernels #116"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  Set-repos: 
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: "${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      kernelDevice: "${{ matrix.repos.kernelSource.device }}"
      # Ajustado a la ruta vendor/sm8250 que mencionaste
      DEFCONFIG_NAME: "vendor/${{ matrix.repos.kernelSource.device }}_defconfig"
      
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "${{ env.kernelDir }}"

      - name: "⭐ Install Build Environment"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev
          
          # Instalación crítica de Python 2.7 para scripts de Qualcomm (DTBO)
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz && cd Python-2.7.18
          ./configure --prefix=/usr/local --enable-shared LDFLAGS="-Wl,-rpath /usr/local/lib"
          make -j$(nproc) && sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          cd .. && rm -rf Python-2.7.18*

      - name: "🌟 Clone kernel source"
        working-directory: "./${{ env.kernelDir }}"
        run: git clone --recursive --branch "${{ env.kernelBranch }}" "${{ env.kernelRepo }}" "${{ env.kernelName }}" --depth=1

      - name: "💫 Get Toolchains (Clang AOSP & GCC)"
        working-directory: "./${{ env.kernelDir }}"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          export GIT_TERMINAL_PROMPT=0
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1 || git clone --recursive "$repo" "$name" --depth=1 || true
            
            # Añadir binarios al PATH
            if [ -d "$(pwd)/$name/bin" ]; then
              echo "$(pwd)/$name/bin" >> $GITHUB_PATH
            else
              echo "$(pwd)/$name" >> $GITHUB_PATH
            fi
          done

      - name: "😎 Setup Compilation Arguments"
        id: generate-args
        working-directory: "./${{ env.kernelDir }}"
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          # Activación de LLVM e Integrated Assembler (IAS) para SM8250
          args="ARCH=arm64 O=$(pwd)/${{ env.OUT_DIR }} LLVM=1 LLVM_IAS=1"
          
          # Inyección de KCFLAGS para omitir advertencias que rompen la build en Clang
          args="$args KCFLAGS=\"-Wno-error -Wno-implicit-function-declaration -Wno-unknown-warning-option\""
          
          for key in CROSS_COMPILE CLANG_TRIPLE CROSS_COMPILE_ARM32 AR CC LD NM OBJCOPY OBJDUMP STRIP; do
            val=$(echo "$params" | jq -r ".$key")
            if [ "$val" != "null" ]; then args="$args $key=$val"; fi
          done
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "🛠️ Fixes & Parches de LG"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          # Eliminar Werror de los Makefiles
          find . -type f -name "Makefile*" -exec sed -i 's/-Werror//g' {} +
          
          # Fix de humedad SMB5 (Drivers de LG)
          SMB5_FILE=$(find . -name "qpnp-smb5.c" | head -n 1)
          if [ -n "$SMB5_FILE" ]; then
            sed -i 's/defined(CONFIG_LGE_USB_MOISTURE_DETECTION)/0 \&\& defined(CONFIG_LGE_USB_MOISTURE_DETECTION)/g' "$SMB5_FILE"
            sed -i 's/chg->uusb_moisture_protection_capable =/\/\/ /g' "$SMB5_FILE"
          fi

      - name: "🛠️ Compilación del Kernel"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          # 1. Configurar
          make ${{ steps.generate-args.outputs.args }} ${{ env.DEFCONFIG_NAME }}
          # 2. Compilar
          make -j$(nproc --all) ${{ steps.generate-args.outputs.args }}

      - name: "📤 Subir Artefactos (Image & DTBO)"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-LG-V60-${{ github.run_number }}"
          path: |
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image*
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/dtbo.img
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/dtb*
