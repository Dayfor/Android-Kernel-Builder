name: Compilar Kernel SM8250

on:
  push:
    branches: [ lineage-21.0, main ]
  pull_request:
    branches: [ lineage-21.0, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Instalar dependencias
      run: |
        apt-get update
        apt-get install -y build-essential libssl-dev libelf-dev bison flex

    - name: Descargar compiladores cruzados
      run: |
        mkdir -p toolchains
        cd toolchains
        # Descargar los compiladores necesarios
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/refs/heads/main/clang-r498229b.tar.gz
        tar -xzf clang-r498229b.tar.gz
        # Descargar compiladores ARM
        wget https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.tar.gz
        tar -xzf aarch64-linux-android-4.9.tar.gz

    - name: Compilar Kernel
      run: |
        export args="-j$(nproc --all) \
          O=./out \
          ARCH=arm64 \
          CROSS_COMPILE=./toolchains/aarch64-linux-android-4.9/bin/aarch64-linux-android- \
          CROSS_COMPILE_ARM32=./toolchains/arm-linux-androideabi-4.9/bin/arm-linux-androideabi- \
          CC=./toolchains/clang-r498229b/bin/clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          LLVM_IAS=1"
        
        make ${args} vendor/timelm-perf_defconfig
        make ${args}

    - name: Subir artefactos
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: kernel-build
        path: out/arch/arm64/boot/Image.gz-dtb
        retention-days: 30

    - name: Crear Release
      if: success() && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: out/arch/arm64/boot/Image.gz-dtb
