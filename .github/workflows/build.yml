name: "Kernel Build: LG V60 NTSYNC"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos=$(cat ${{ env.CONFIGURATION }} | jq -c .)" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    
    steps:
      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu libssl-dev jq patch

      - name: "🌟 Clone Source"
        run: |
          git clone --branch ${{ matrix.repos.kernelSource.branch }} ${{ matrix.repos.kernelSource.repo }} kernel_source --depth=1

      - name: "🛠️ Inyectar NTSYNC (Modo Seguro)"
        working-directory: ./kernel_source
        run: |
          mkdir -p drivers/android/ntsync
          mkdir -p include/uapi/linux

          # Inyectar Header vía Base64
          echo "" | base64 -d > include/uapi/linux/ntsync.h

          # Inyectar Source vía Base64
          echo "  " | base64 -d > drivers/android/ntsync/ntsync.c

          # Configurar compilación
          echo 'obj-$(CONFIG_NTSYNC) += ntsync.o' > drivers/android/ntsync/Makefile
          echo -e 'config NTSYNC\n\ttristate "NTSYNC support"\n\tdefault y' > drivers/android/ntsync/Kconfig
          
          KCONFIG_MAIN=$(find drivers/android/ -name "Kconfig" | head -n 1)
          sed -i '/config ANDROID_BINDERFS/i source "drivers/android/ntsync/Kconfig"' "$KCONFIG_MAIN"
          echo 'obj-$(CONFIG_NTSYNC) += ntsync/' >> drivers/android/Makefile

          # Habilitar en defconfig y limpiar Werror
          CONF_PATH="arch/arm64/configs/${{ matrix.repos.kernelSource.device }}_defconfig"
          echo "CONFIG_NTSYNC=y" >> "$CONF_PATH"
          find . -name "Makefile*" -o -name "Kbuild*" | xargs sed -i 's/-Werror//g'

      - name: "😎 Set Args"
        id: generate-args
        working-directory: ./kernel_source
        env:
          P_JSON: ${{ toJSON(matrix.repos.params) }}
        run: |
          ARCH=$(echo "$P_JSON" | jq -r '.ARCH')
          ARGS="-j$(nproc --all) ARCH=$ARCH O=$(pwd)/../${{ env.OUT_DIR }} KCFLAGS='-Wno-error'"
          
          # Cargar Toolchains en el PATH
          echo '${{ toJSON(matrix.repos.toolchains) }}' | jq -c '.[]' | while read -r tc; do
            name=$(echo $tc | jq -r '.name')
            repo=$(echo $tc | jq -r '.repo')
            branch=$(echo $tc | jq -r '.branch')
            git clone --branch "$branch" "$repo" "$name" --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

          # Construir resto de argumentos
          EXTRA_VARS=$(echo "$P_JSON" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"')
          for var in $EXTRA_VARS; do
            if [[ ! $var =~ "ARCH=" ]]; then ARGS="$ARGS $var"; fi
          done
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: "👍 Build"
        working-directory: ./kernel_source
        run: |
          make ${{ steps.generate-args.outputs.args }} ${{ matrix.repos.kernelSource.device }}_defconfig
          make ${{ steps.generate-args.outputs.args }}

      - name: "📤 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-NTSYNC-${{ matrix.repos.kernelSource.device }}"
          path: ./${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz-dtb
