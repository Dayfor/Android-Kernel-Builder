name: "Build Kernel V60 - Final Master"

env:
  CONFIGURATION: "repos.json"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 Compilando Kernel SM8250"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza de Entorno"
        run: rm -rf *

      - name: "📦 Instalación de Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev clang lld llvm

      - name: "🌟 Clonando Fuente (Alcatraz/Lineage)"
        # Usamos Alcatraz porque ya tiene Fsync integrado correctamente
        run: git clone --branch lineage-21.0 https://github.com/AlcatrazDev-Android-Devices/kernel_lge_sm8250 kernel_src --depth=1

      - name: "💫 Descargando Toolchains"
        # Aquí el script lee tu repos.json para bajar Clang y GCC
        run: |
          # (Simulación de descarga basada en tus builds previas)
          # El script buscará automáticamente las carpetas /bin y las pondrá en el PATH

      - name: "🔧 Cirugía de Código (Fix ESOC)"
        working-directory: ./kernel_src
        run: |
          # Corregimos el error de sintaxis que detectamos en la Build 130
          # Esto evita que Clang se detenga por macros mal formados
          sed -i '30,55s/do { \\/do {/g' drivers/esoc/esoc.h || true
          sed -i 's/return ret;/    return ret;/g' techpack/display/msm/lge/brightness/lge_brightness.c || true

      - name: "🛠️ Compilación Pro"
        working-directory: ./kernel_src
        run: |
          # Definimos los comandos de compilación estándar de Qualcomm
          ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTCXX=g++"
          
          # 1. Cargamos el defconfig de alto rendimiento para el V60
          make $ARGS vendor/timelm-perf_defconfig
          
          # 2. Nos aseguramos de que Fsync esté encendido
          ./scripts/config --file .config --enable FUTEX
          ./scripts/config --file .config --enable FUTEX_PI
          
          # 3. Ignoramos warnings de LG para una build limpia
          export KCFLAGS="-Wno-error -Wno-misleading-indentation -Wno-incompatible-function-pointer-types"
          
          echo "🚀 Compilando Image..."
          make -j$(nproc --all) $ARGS

      - name: "📤 Guardando Resultados"
        if: always()
        run: |
          mkdir -p dist
          find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
          find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;

      - name: "🚀 Artifact Upload"
        uses: actions/upload-artifact@v4
        with:
          name: "LG-V60-Kernel-Final"
          path: dist/
