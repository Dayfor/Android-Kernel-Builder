name: "Build kernels #134 - A15 Boot-Match"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🚀 V60 A15 Boot-Injected Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential curl git libpcre3-dev \
          libssl-dev lzop zlib1g-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          checkpolicy bison flex libncurses5-dev python3 libarchive-tools \
          clang lld llvm

      - name: "🌟 Clonando Fuente (Kofir)"
        run: |
          git clone --branch 4.19 https://github.com/rofikkerneldev/kernel_lgv600tm_4.19 kernel_src --depth=1

      - name: "🔧 Inyección de Código y Parches"
        working-directory: ./kernel_src
        run: |
          # 1. Fix MMU Notifier (Vital para Clang moderno)
          python3 -c "
          import sys
          path = 'include/linux/mmu_notifier.h'
          with open(path, 'r') as f: content = f.read()
          if 'enum mmu_notifier_event' not in content:
              insertion = '\nenum mmu_notifier_event { MMU_NOTIFIER_RELEASE, MMU_NOTIFIER_UNMAP };\n'
              content = content.replace('struct mmu_notifier_range {', insertion + 'struct mmu_notifier_range {')
              with open(path, 'w') as f: f.write(content)
          "
          
          # 2. Desactivar Werror en Makefiles
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror/-Wno-error/g'

      - name: "🛠️ Configuración y Build"
        working-directory: ./kernel_src
        run: |
          LLD_PATH=$(which ld.lld)
          
          # Argumentos de compilación con las herramientas de LLVM
          ARGS="ARCH=arm64 \
                LLVM=1 \
                LLVM_IAS=1 \
                CC=clang \
                LD=$LLD_PATH \
                AR=llvm-ar \
                NM=llvm-nm \
                OBJCOPY=llvm-objcopy \
                OBJDUMP=llvm-objdump \
                STRIP=llvm-strip \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi-"
          
          make $ARGS timelm_defconfig
          
          # EXTRAÍDO DEL BOOT.IMG: Inyectamos los parámetros en el build final
          # Estos flags desactivan protecciones de kernel antiguas que chocan con Android 15
          KCF="-Wno-error -Wno-visibility -Wno-incompatible-function-pointer-types -Wno-implicit-function-declaration -Wno-return-type"
          
          echo "🚀 Compilando Kernel con parámetros de Android 15..."
          make -j$(nproc --all) $ARGS KCFLAGS="$KCF"

      - name: "📦 Empaquetado con Offsets del boot.img"
        if: always()
        run: |
          mkdir -p dist
          # Copiamos el kernel crudo
          if [ -f "kernel_src/arch/arm64/boot/Image.gz-dtb" ]; then
            cp kernel_src/arch/arm64/boot/Image.gz-dtb dist/
          elif [ -f "kernel_src/arch/arm64/boot/Image" ]; then
            cp kernel_src/arch/arm64/boot/Image dist/
          fi
          
          # Guardamos los metadatos que extrajimos de tu boot.img para referencia
          echo "androidboot.memcg=1 kpti=off cgroup.memory=nokmem,nosocket androidboot.hardware=timelm" > dist/recommended_cmdline.txt
          echo "Base: 0x00000000, Kernel Offset: 0x00008000, Ramdisk Offset: 0x01000000" > dist/boot_offsets.txt

      - name: "📤 Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-A15-Injected"
          path: dist/
