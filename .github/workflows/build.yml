name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "ЁЯРВ Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "ЁЯШД Checkout"
        uses: actions/checkout@v3

      - name: "ЁЯШЖ Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "ЁЯРО Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "тЬи Create working dir"
        run: mkdir -p $kernelDir

      - name: "тнР Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz && cd Python-2.7.18
          ./configure --prefix=/usr/local --enable-unicode=ucs4 --enable-shared LDFLAGS="-Wl,-rpath /usr/local/lib"
          make -j$(nproc) && sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          cd .. && rm -rf Python-2.7.18*

      - name: "ЁЯМЯ Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: git clone --recursive --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "ЁЯТЙ Aplicar Parche NTSYNC"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          wget https://raw.githubusercontent.com/Project-Vortex/android_kernel_patches/main/ntsync/ntsync.patch || curl -Lo ntsync.patch https://raw.githubusercontent.com/Project-Vortex/android_kernel_patches/main/ntsync/ntsync.patch
          if [ -f ntsync.patch ]; then
            patch -p1 --ignore-whitespace < ntsync.patch || echo "Aviso: Parche con conflictos menores, continuando..."
          fi
          
          # Inyectar requisitos para ntsync y Android 15
          REAL_CONFIG=$(find arch/arm64/configs/ -name "${{ env.DEFCONFIG_NAME }}" | head -n 1)
          [ -z "$REAL_CONFIG" ] && REAL_CONFIG=$(find arch/arm64/configs/ -name "lito-perf_defconfig" | head -n 1)
          
          if [ -n "$REAL_CONFIG" ]; then
            sed -i '/CONFIG_NTSYNC/d' "$REAL_CONFIG"
            echo -e "\nCONFIG_NTSYNC=y\nCONFIG_BPF_SYSCALL=y\nCONFIG_USERFAULTFD=y\nCONFIG_MEMBARRIER=y\nCONFIG_ANDROID_BINDER_IPC=y" >> "$REAL_CONFIG"
          fi

      - name: "ЁЯТл Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch $branch $repo $name --depth=1
            # Agregar a PATH de forma agresiva
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
            export PATH="$(pwd)/$name/bin:$PATH"
          done

      - name: "ЁЯШО Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS=$(echo $params | jq -r ".CROSS_COMPILE")
          CLANG=$(echo $params | jq -r ".CC")
          
          mkdir -p $(pwd)/${{ env.OUT_DIR }}
          # Usamos solo 3 hilos para m├бxima estabilidad en el servidor de GitHub
          echo "args=-j3 O=$(pwd)/${{ env.OUT_DIR }} ARCH=$ARCH CROSS_COMPILE=$CROSS CC=$CLANG" >> $GITHUB_OUTPUT

      - name: "ЁЯСН Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          CONF_NAME=$(find arch/arm64/configs/ -name "${{ env.DEFCONFIG_NAME }}" -printf "%P\n" | head -n 1)
          [ -z "$CONF_NAME" ] && CONF_NAME=$(find arch/arm64/configs/ -name "lito-perf_defconfig" -printf "%P\n" | head -n 1)
          make ${{ env.args }} $CONF_NAME

      - name: "ЁЯО╢ Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          # Limpiar y compilar con reintento autom├бtico
          make ${{ steps.generate-args.outputs.args }} clean
          make ${{ steps.generate-args.outputs.args }} || make -j1 O=$(pwd)/../${{ env.OUT_DIR }} ARCH=arm64

      - name: "ЁЯТЫ Upload"
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-LGV60-NTSYNC-Final
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/
          
