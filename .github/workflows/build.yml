name: "Build kernels #134 - Lineage Official Base"

env:
  CONFIGURATION: "repos.json"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  Set-repos: 
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4
      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      
    steps:
      - name: "✨ Clean Workspace"
        run: rm -rf *

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev clang lld llvm

      - name: "🌟 Clone Official Source"
        run: |
          echo "Clonando rama: ${{ env.kernelBranch }}"
          git clone --branch "${{ env.kernelBranch }}" "${{ env.kernelRepo }}" kernel_src --depth=1 || \
          git clone "${{ env.kernelRepo }}" kernel_src --depth=1

      - name: "💫 Setup Toolchains"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --branch "$branch" "$repo" "$name" --depth=1 || git clone "$repo" "$name" --depth=1
            
            # Inyectar binarios al PATH
            BIN_PATH=$(find $(pwd)/$name -type d -name "bin" | head -n 1)
            if [ -n "$BIN_PATH" ]; then
              echo "$BIN_PATH" >> $GITHUB_PATH
            else
              echo "$(pwd)/$name" >> $GITHUB_PATH
            fi
          done

      - name: "🛠️ Compilación Base"
        working-directory: ./kernel_src
        run: |
          # Argumentos para Clang/LLVM
          MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTCXX=g++"
          
          # 1. Configurar (Lineage usa vendor/timelm-perf_defconfig)
          make $MAKE_ARGS vendor/timelm-perf_defconfig
          
          # 2. Ignorar warnings pesados
          export KCFLAGS="-Wno-error -Wno-misleading-indentation -Wno-incompatible-function-pointer-types"
          
          echo "🚀 Iniciando compilación de Image..."
          make -j$(nproc --all) $MAKE_ARGS

      - name: "📦 Exportar Artefactos"
        if: always()
        run: |
          mkdir -p dist
          find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
          find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          echo "✅ Archivos generados:"
          ls -lh dist/

      - name: "📤 Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-Lineage-B134"
          path: dist/

