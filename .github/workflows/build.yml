name: "Build kernels #134 - Alcatraz Final Sync"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🚀 V60 Final Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential curl git libpcre3-dev \
          libssl-dev lzop zlib1g-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          checkpolicy bison flex libncurses5-dev python3 libarchive-tools \
          clang lld llvm

      - name: "🌟 Clonando Fuente"
        run: |
          git clone --branch main https://github.com/AlcatrazDev-Android-Devices/kernel_lge_sm8250 kernel_src --depth=1 || \
          git clone https://github.com/AlcatrazDev-Android-Devices/kernel_lge_sm8250 kernel_src --depth=1

      - name: "✂️ Cirugía de Makefile y Techpack"
        working-directory: ./kernel_src
        run: |
          # Eliminar menciones de techpack para que no intente entrar
          sed -i '/techpack/d' Makefile
          sed -i '/techpack/d' scripts/Makefile.build
          # Eliminar la carpeta para liberar espacio y evitar escaneos
          rm -rf techpack

      - name: "🔧 Inyección Maestra de MMU Notifier"
        working-directory: ./kernel_src
        run: |
          # Inyectamos el enum directamente al principio de mmu_notifier.h para que sea global
          python3 -c "
          import sys
          path = 'include/linux/mmu_notifier.h'
          with open(path, 'r') as f: lines = f.readlines()
          # Insertar después de los primeros comentarios/includes
          for i, line in enumerate(lines):
              if '#define' in line or '#include' in line:
                  lines.insert(i + 1, '\nenum mmu_notifier_event { MMU_NOTIFIER_RELEASE, MMU_NOTIFIER_UNMAP };\n')
                  break
          with open(path, 'w') as f: f.writelines(lines)
          "
          
          # Desactivar Werror agresivamente
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror/-Wno-error/g'

      - name: "🛠️ Configuración"
        working-directory: ./kernel_src
        run: |
          LLD_PATH=$(which ld.lld)
          ARGS="ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=$LLD_PATH"
          make $ARGS vendor/timelm_defconfig || make $ARGS timelm_defconfig || make $ARGS defconfig
          
          # Asegurar que la config no busque techpack
          sed -i 's/CONFIG_TECHPACK=y/CONFIG_TECHPACK=n/g' .config
          make $ARGS olddefconfig

      - name: "🚀 Compilación de Imagen"
        working-directory: ./kernel_src
        run: |
          LLD_PATH=$(which ld.lld)
          ARGS="ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=$LLD_PATH AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-"
          
          # Añadimos flags para ignorar errores de tipos incompletos si persisten
          KCF="-Wno-error -Wno-visibility -Wno-incompatible-function-pointer-types -Wno-implicit-function-declaration -Wno-return-type"
          
          make -j$(nproc --all) $ARGS KCFLAGS="$KCF"

      - name: "📦 Exportar Artefactos"
        if: always()
        run: |
          mkdir -p dist
          find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
          find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          echo "androidboot.memcg=1 kpti=off cgroup.memory=nokmem,nosocket" > dist/flash_instructions.txt

      - name: "📤 Subiendo"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-Alcatraz-Final"
          path: dist/
