name: "Build kernels #134 - Lineage 23.2 Fix"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 V60 Android 16 Build"
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Limpieza"
        run: rm -rf *

      - name: "📦 Dependencias"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential curl git libpcre3-dev \
          libssl-dev lzop zlib1g-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          checkpolicy bison flex libncurses5-dev python3 libarchive-tools wget

      - name: "🌟 Clonando Fuente (Rama 23.2)"
        run: |
          git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_lge_sm8250 kernel_src --depth=1

      - name: "💫 Setup Clang (Google Official)"
        run: |
          # Descargamos Clang R416183b1 directamente desde los servidores de Google
          mkdir -p clang
          cd clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b1.tar.gz
          tar -xf clang-r416183b1.tar.gz
          echo "$(pwd)/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$(pwd)/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: "🛠️ Compilación Final"
        working-directory: ./kernel_src
        run: |
          # Argumentos de compilación
          ARGS="ARCH=arm64 \
                CC=clang \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                LLVM=1 \
                LLVM_IAS=1"
          
          echo "📝 Configurando con defconfig..."
          make $ARGS defconfig
          
          echo "🚀 Iniciando build..."
          # Usamos KCFLAGS para saltar errores de visibilidad
          make -j$(nproc --all) $ARGS KCFLAGS="-Wno-error"

      - name: "📦 Exportar"
        if: always()
        run: |
          mkdir -p dist
          if [ -d "kernel_src/arch/arm64/boot" ]; then
            find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
            find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          fi

      - name: "📤 Subiendo Artefactos"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-L23.2-B134"
          path: dist/
