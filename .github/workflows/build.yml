name: "Build kernels #131 - ESOC Fix Edition"

env:
  CONFIGURATION: "repos.json"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  Set-repos: 
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4
      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelName: "${{ matrix.repos.kernelSource.name }}"
      kernelRepo: "${{ matrix.repos.kernelSource.repo }}"
      kernelBranch: "${{ matrix.repos.kernelSource.branch }}"
      
    steps:
      - name: "✨ Clean Workspace"
        run: rm -rf *

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev clang lld llvm

      - name: "🌟 Clone kernel source"
        run: git clone --branch "${{ env.kernelBranch }}" "${{ env.kernelRepo }}" kernel_src --depth=1

      - name: "💫 Get toolchains"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num=$(echo "$toolchains" | jq 'length')
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")
            git clone --branch "$branch" "$repo" "$name" --depth=1 || git clone "$repo" "$name" --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "🔧 Fix Syntax Errors (ESOC & LGE)"
        working-directory: ./kernel_src
        run: |
          echo "🛠️ Reparando drivers/esoc/esoc.h..."
          # Comentamos las líneas del macro mal formado que rompió la Build 130
          sed -i '35,42s/^/\/\//' drivers/esoc/esoc.h
          
          echo "🛠️ Corrigiendo indentación en lge_brightness.c..."
          # Arreglamos el warning de indentación para evitar que el compilador sea estricto
          sed -i 's/return ret;/    return ret;/g' techpack/display/msm/lge/brightness/lge_brightness.c
          
          echo "✅ Parches aplicados."

      - name: "🛠️ Compilación Final"
        working-directory: ./kernel_src
        run: |
          # Args híbridos: Clang para el kernel, GCC para el sistema
          MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTCXX=g++"
          
          # Configuración
          make $MAKE_ARGS timelm_defconfig
          
          # Desactivamos advertencias que detienen la build
          export KCFLAGS="-Wno-misleading-indentation -Wno-error -Wno-incompatible-function-pointer-types"
          
          echo "🚀 Iniciando compilación de Image..."
          make -j$(nproc --all) $MAKE_ARGS

      - name: "📦 Exportar Artefactos"
        if: always()
        run: |
          mkdir -p dist
          find kernel_src/ -name "Image*" -type f -not -path "*/scripts/*" -exec cp {} dist/ \;
          find kernel_src/ -name "dtbo.img" -type f -exec cp {} dist/ \;
          echo "Contenido de dist:"
          ls -lh dist/

      - name: "📤 Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-LGE-V60-B131-Fixed"
          path: dist/
