name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --prefix=/usr/local --enable-unicode=ucs4 --enable-shared LDFLAGS="-Wl,-rpath /usr/local/lib"
          make -j$(nproc)
          sudo make altinstall
          sudo ln -s /usr/local/bin/python2.7 /usr/bin/python2
          cd ..
          rm -rf Python-2.7.18 Python-2.7.18.tgz

      - name: "🌟 Clone kernel source => (${{ env.kernelRepo }})"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "💉 Aplicar Parche NTSYNC y Requisitos Android 15"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          # 1. Intentar descargar el parche desde una fuente alternativa si falla la primera
          wget https://raw.githubusercontent.com/Project-Vortex/android_kernel_patches/main/ntsync/ntsync.patch || \
          curl -Lo ntsync.patch https://raw.githubusercontent.com/Project-Vortex/android_kernel_patches/main/ntsync/ntsync.patch

          # 2. Aplicar el parche si existe
          if [ -f ntsync.patch ]; then
            patch -p1 --ignore-whitespace < ntsync.patch || echo "Aviso: Conflicto en el parche, se ignorará."
          fi

          # 3. Búsqueda automática del defconfig
          # Buscamos el archivo que coincida con ${{ env.DEFCONFIG_NAME }} en todo arch/arm64/configs/
          REAL_CONFIG=$(find arch/arm64/configs/ -name "${{ env.DEFCONFIG_NAME }}" | head -n 1)

          if [ -z "$REAL_CONFIG" ]; then
            # Si no lo encuentra con el nombre exacto, intentamos con lito-perf_defconfig
            REAL_CONFIG=$(find arch/arm64/configs/ -name "lito-perf_defconfig" | head -n 1)
          fi

          if [ -n "$REAL_CONFIG" ]; then
            echo "Configurando archivo: $REAL_CONFIG"
            echo "CONFIG_NTSYNC=y" >> "$REAL_CONFIG"
            echo "CONFIG_BPF_SYSCALL=y" >> "$REAL_CONFIG"
            echo "CONFIG_USERFAULTFD=y" >> "$REAL_CONFIG"
            echo "CONFIG_MEMBARRIER=y" >> "$REAL_CONFIG"
            echo "CONFIG_ANDROID_BINDER_IPC=y" >> "$REAL_CONFIG"
          else
            echo "Error: No se pudo encontrar ningún archivo de configuración compatible."
            exit 1
          fi

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch $branch $repo $name --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          args="-j$(nproc --all)"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p $(pwd)/${{ env.OUT_DIR }}
            args="$args O=$(pwd)/${{ env.OUT_DIR }}"
          fi
          args="$args ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE"
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          # Usar el mismo buscador para el comando make
          REAL_CONFIG_NAME=$(find arch/arm64/configs/ -name "${{ env.DEFCONFIG_NAME }}" -printf "%P\n" | head -n 1)
          [ -z "$REAL_CONFIG_NAME" ] && REAL_CONFIG_NAME=$(find arch/arm64/configs/ -name "lito-perf_defconfig" -printf "%P\n" | head -n 1)
          make ${{ env.args }} $REAL_CONFIG_NAME

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: make ${args}

      - name: "💛 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-V60-Final
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/
          
