name: Build LG SM8250 Kernel (Direct)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison git python3 libssl-dev libelf-dev clang lld llvm

      - name: Clone Sources
        run: |
          git clone --depth=1 https://github.com/AlcatrazDev-Android-Devices/kernel_lge_sm8250 -b 11 kernel
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b master-kernel-build-2021 clang

      - name: Configure Kernel with boot.img params
        run: |
          cd kernel
          # Cargar la configuración base para timelm (LG SM8250)
          make O=out vendor/timelm_defconfig
          
          # Aplicar ajustes específicos extraídos de tu boot.img
          scripts/config --objtree out --set-str CONFIG_CMDLINE "androidboot.memcg=1 video=vfb:640x400,bpp=32,memsize=3072000 lpm_levels.sleep_disabled=1 msm_rtb.filter=0x237 service_locator.enable=1 swiotlb=2048 loop.max_part=7 androidboot.usbcontroller=a600000.dwc3 kpti=off cgroup.memory=nokmem,nosocket androidboot.init_fatal_reboot_target=recovery androidboot.hardware=timelm"
          scripts/config --objtree out --enable CONFIG_CMDLINE_EXTEND
          
          # Asegurar que el kernel no falle por flags de linker modernos (basado en tu error anterior)
          sed -i 's/--orphan-handling=warn//g' scripts/Makefile.extrawarn || true

      - name: Compilation
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          
          make -j$(nproc --all) O=out \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb-SM8250
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
