name: Android Kernel Builder (A15 + NTSYNC)

on:
  workflow_dispatch:
    inputs:
      KERNEL_INDEX:
        description: 'Index of kernel to build (from repos.json)'
        required: true
        default: '0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld jq patch

      - name: ⚙️ Configurar y Clonar
        run: |
          # Damos permisos al script si existe en el repo
          [ -f "build.sh" ] && chmod +x build.sh
          # Ejecutamos el setup original de Dayfor
          ./build.sh --setup ${{ github.event.inputs.KERNEL_INDEX }}

      - name: 🛠️ Inyectar Parches (A15, NTSYNC y Fixes LG)
        run: |
          # Entramos a la carpeta donde se clonó el kernel (usualmente 'source')
          cd source || cd kernel || exit 1
          
          # 1. Fix de variables LPD para evitar error 'undeclared identifier'
          # Esto sincroniza el .c con el .h que editamos antes
          sed -i 's/__lpd_ux/chg->lpd_ux/g' drivers/power/supply/qcom/qpnp-smb5.c || true

          # 2. Registrar el driver NTSYNC para emulación de juegos
          cat <<EOF > ntsync.patch
          --- a/drivers/android/Kconfig
          +++ b/drivers/android/Kconfig
          @@ -10,6 +10,12 @@
           	  The binder API is the primary method of inter-process communication
           	  (IPC) for the Android platform.
           
          +config NTSYNC
          +	tristate "Windows-compatible synchronization primitives"
          +	help
          +	  Soporte para primitivas de sincronización compatibles con Windows NT.
          +
           config ANDROID_BINDERFS
           	bool "Android Binder filesystem"
          EOF
          patch -p1 < ntsync.patch || echo "Aviso: El parche NTSYNC podría ya estar aplicado."

          # 3. Configurar Defconfig para Android 15 y NTSYNC
          DEFCONFIG_FILE=$(find arch/arm64/configs/ -name "*lito-perf_defconfig*" | head -n 1)
          if [ -f "$DEFCONFIG_FILE" ]; then
            echo "Optimizando $DEFCONFIG_FILE..."
            {
              echo "CONFIG_NTSYNC=y"
              echo "CONFIG_ANDROID_BINDERFS=y"
              echo "CONFIG_BPF_SYSCALL=y"
              echo "CONFIG_USERFAULTFD=y"
              echo "CONFIG_MEMBARRIER=y"
            } >> "$DEFCONFIG_FILE"
          fi
          
          # 4. Desactivar Werror para ignorar advertencias menores de LG
          sed -i 's/-Werror//g' Makefile

      - name: 🚀 Compilar Kernel
        run: |
          # Usamos el comando de compilación del script de Dayfor
          ./build.sh --build ${{ github.event.inputs.KERNEL_INDEX }}

      - name: Subir Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-V60-A15-NTSYNC
          path: out/arch/arm64/boot/Image.gz-dtb
