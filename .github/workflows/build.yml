name: Build Kernel

on:
  push:
    branches:
      - lineage-21.0
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Install build tools
      run: |
        apt-get update
        apt-get install -y build-essential libssl-dev libelf-dev bison flex git wget
    
    - name: Build kernel
      run: bash build.sh
    
    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: out/
        retention-days: 7

git add .github/workflows/build.yml
git commit -m "Fix: Update artifact actions to v4"
git push origin lineage-21.0
