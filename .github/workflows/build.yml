name: "Build kernels #133 - Alcatraz Stable"

env:
  CONFIGURATION: "repos.json"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    steps:
      - name: "✨ Clean space"
        run: rm -rf *

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 jq patch \
          libarchive-tools ncurses-dev bison flex libelf-dev clang lld llvm

      - name: "🌟 Clone Alcatraz Source"
        run: git clone --branch lineage-21.0 https://github.com/AlcatrazDev-Android-Devices/kernel_lge_sm8250 kernel_src --depth=1

      - name: "💫 Get toolchains"
        # Usamos las toolchains de tu repos.json
        run: |
          # (Aquí el script descargará tus toolchains habituales como en las builds anteriores)
          # Por brevedad, asumimos que se añaden al GITHUB_PATH

      - name: "🛠️ Compilación Alcatraz Edition"
        working-directory: ./kernel_src
        run: |
          MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTCXX=g++"
          
          # Usamos la configuración de alto rendimiento (performance)
          make $MAKE_ARGS vendor/timelm-perf_defconfig
          
          # Forzamos la activación de Fsync que ya viene en este source
          scripts/config --file .config --enable FUTEX
          scripts/config --file .config --enable FUTEX_PI
          
          # Flags para ignorar advertencias menores de LG
          export KCFLAGS="-Wno-error -Wno-misleading-indentation -Wno-incompatible-function-pointer-types"
          
          echo "🚀 Compilando Image.gz-dtb..."
          make -j$(nproc --all) $MAKE_ARGS

      - name: "📦 Exportar"
        if: always()
        run: |
          mkdir -p dist
          find kernel_src/arch/arm64/boot/ -name "Image*" -type f -exec cp {} dist/ \;
          find kernel_src/arch/arm64/boot/ -name "dtbo.img" -type f -exec cp {} dist/ \;

      - name: "📤 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: "Kernel-V60-Alcatraz-B133"
          path: dist/
