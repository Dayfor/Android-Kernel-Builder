name: "Kernel Build: LG V60 NTSYNC (Lineage 21.0)"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos=$(cat ${{ env.CONFIGURATION }} | jq -c .)" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      fail-fast: true
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    
    steps:
      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu libssl-dev jq patch libncurses5-dev

      - name: "🌟 Clone Source"
        run: |
          git clone --branch lineage-21.0 https://github.com/Dayfor/kernel_lge_sm8250 kernel_source --depth=1

      - name: "🛠️ Inyectar NTSYNC (Base64 Safe)"
        working-directory: ./kernel_source
        run: |
          mkdir -p drivers/android/ntsync
          mkdir -p include/uapi/linux

          # Inyectar Header
          echo "
